<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7c3aed">
<title>Mis Hábitos</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070f;
    --bg2: #0f0f1a;
    --bg3: #16162a;
    --glass: rgba(255,255,255,0.04);
    --glass2: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.08);
    --purple: #7c3aed;
    --purple2: #a855f7;
    --purple3: #c084fc;
    --green: #10b981;
    --yellow: #f59e0b;
    --orange: #f97316;
    --red: #ef4444;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 90px;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 16px 20px 12px;
    background: rgba(7,7,15,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .greeting { font-size: 13px; color: var(--text2); font-weight: 500; }
  .date-label { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .streak-badge {
    background: linear-gradient(135deg, var(--purple), var(--purple2));
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 700;
  }

  /* TABS */
  .tab-content { display: none; padding: 20px; position: relative; z-index: 1; }
  .tab-content.active { display: block; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 200;
    display: flex;
    background: rgba(15,15,26,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--purple2); }
  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn .nav-label { font-size: 10px; font-weight: 600; }
  .nav-btn.active .nav-icon { filter: drop-shadow(0 0 8px var(--purple2)); }

  /* CARDS */
  .card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(10px);
    margin-bottom: 16px;
  }
  .card-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

  /* PROGRESS RING */
  .ring-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px;
    margin-bottom: 16px;
  }
  .ring-container { position: relative; width: 200px; height: 200px; }
  .ring-svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 14; }
  .ring-progress {
    fill: none;
    stroke-width: 14;
    stroke-linecap: round;
    stroke-dasharray: 565;
    stroke-dashoffset: 565;
    transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1), stroke 0.5s;
  }
  .ring-inner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .ring-number { font-size: 52px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
  .ring-total { font-size: 16px; color: var(--text2); font-weight: 500; }
  .ring-label { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .motivational { font-size: 15px; font-weight: 600; color: var(--text2); text-align: center; margin-top: 16px; padding: 0 20px; }

  /* HABIT CARDS */
  .habits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .habit-card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px 14px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    gap: 10px;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .habit-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--purple), var(--purple2));
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 18px;
  }
  .habit-card.done { border-color: var(--purple); box-shadow: 0 0 20px rgba(124,58,237,0.25); }
  .habit-card.done::before { opacity: 0.12; }
  .habit-card:active { transform: scale(0.96); }
  .habit-emoji { font-size: 28px; position: relative; z-index: 1; }
  .habit-name { font-size: 13px; font-weight: 600; line-height: 1.3; position: relative; z-index: 1; }
  .habit-check {
    width: 24px; height: 24px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    margin-left: auto;
    transition: all 0.3s;
    position: relative; z-index: 1;
    align-self: flex-end;
  }
  .habit-card.done .habit-check {
    background: linear-gradient(135deg, var(--purple), var(--purple2));
    border-color: transparent;
  }
  .habit-check::after { content: '✓'; color: white; font-size: 14px; font-weight: 800; opacity: 0; transition: opacity 0.2s; }
  .habit-card.done .habit-check::after { opacity: 1; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
  .habit-card.popping { animation: pop 0.3s ease; }

  /* ENERGY */
  .energy-section { margin-bottom: 16px; }
  .energy-btns { display: flex; gap: 10px; }
  .energy-btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--glass);
    color: var(--text2);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: 'Inter', sans-serif;
  }
  .energy-btn.selected { border-color: var(--purple); color: var(--text); box-shadow: 0 0 15px rgba(124,58,237,0.2); background: rgba(124,58,237,0.15); }

  /* NOTE */
  .note-input {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    resize: none;
    height: 80px;
    transition: border-color 0.2s;
  }
  .note-input:focus { outline: none; border-color: var(--purple); }
  .note-input::placeholder { color: var(--text3); }

  /* WEEK TAB */
  .week-days { display: flex; gap: 8px; justify-content: space-between; margin-bottom: 20px; }
  .week-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .week-day-name { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; }
  .week-day-circle {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    border: 2px solid transparent;
    transition: all 0.3s;
  }
  .week-day-circle.today { border-color: var(--purple2); box-shadow: 0 0 12px rgba(168,85,247,0.4); }
  .week-day-circle.future { background: var(--bg3); color: var(--text3); }
  .week-day-circle.empty { background: var(--bg3); color: var(--text3); }
  .week-day-circle.low { background: rgba(239,68,68,0.2); color: var(--red); }
  .week-day-circle.mid { background: rgba(245,158,11,0.2); color: var(--yellow); }
  .week-day-circle.good { background: rgba(16,185,129,0.2); color: var(--green); }
  .week-day-circle.perfect { background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(168,85,247,0.3)); color: var(--purple3); }
  .week-day-pct { font-size: 10px; color: var(--text3); }

  /* BAR CHART */
  .bar-chart { display: flex; gap: 8px; align-items: flex-end; height: 80px; margin-top: 8px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 6px 6px 0 0; transition: height 0.8s cubic-bezier(0.4,0,0.2,1); min-height: 4px; }
  .bar-val { font-size: 10px; color: var(--text3); font-weight: 600; }

  /* MISSED HABITS */
  .missed-list { display: flex; flex-direction: column; gap: 10px; }
  .missed-item { display: flex; align-items: center; justify-content: space-between; }
  .missed-name { font-size: 14px; font-weight: 500; }
  .missed-bar-wrap { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; margin: 0 12px; }
  .missed-bar { height: 6px; border-radius: 3px; background: linear-gradient(90deg, var(--purple), var(--purple2)); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .missed-count { font-size: 12px; color: var(--text2); font-weight: 600; }

  /* MONTH CALENDAR */
  .cal-header { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 6px; }
  .cal-header-day { font-size: 10px; font-weight: 600; color: var(--text3); text-align: center; text-transform: uppercase; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .cal-day.empty { background: transparent; pointer-events: none; }
  .cal-day.future { background: var(--bg3); color: var(--text3); }
  .cal-day.no-data { background: var(--bg3); color: var(--text3); }
  .cal-day.low { background: rgba(239,68,68,0.25); color: var(--red); }
  .cal-day.mid { background: rgba(245,158,11,0.25); color: var(--yellow); }
  .cal-day.good { background: rgba(16,185,129,0.25); color: var(--green); }
  .cal-day.perfect { background: linear-gradient(135deg, var(--purple), var(--purple2)); color: white; box-shadow: 0 2px 8px rgba(124,58,237,0.4); }
  .cal-day.today-cal { outline: 2px solid var(--purple2); outline-offset: 2px; }
  .cal-day:active { transform: scale(0.9); }

  /* STATS CARDS */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
  }
  .stat-number { font-size: 24px; font-weight: 900; background: linear-gradient(135deg, var(--purple2), var(--purple3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .stat-label { font-size: 10px; color: var(--text3); font-weight: 600; margin-top: 2px; }

  /* STREAKS TAB */
  .streak-card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .streak-emoji { font-size: 32px; }
  .streak-info { flex: 1; }
  .streak-habit-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .streak-level { font-size: 12px; color: var(--purple3); font-weight: 600; margin-bottom: 8px; }
  .streak-progress-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .streak-progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--purple), var(--purple2)); transition: width 0.8s ease; }
  .streak-right { text-align: right; }
  .streak-days { font-size: 36px; font-weight: 900; line-height: 1; background: linear-gradient(135deg, var(--purple2), var(--purple3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .streak-days-label { font-size: 10px; color: var(--text3); font-weight: 600; }
  .streak-status { font-size: 11px; margin-top: 4px; }
  .streak-card.alive { border-color: rgba(16,185,129,0.3); }
  .streak-card.dead { border-color: rgba(239,68,68,0.2); opacity: 0.7; }

  /* BEST STREAK CARD */
  .best-streak-card {
    background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(168,85,247,0.1));
    border: 1px solid rgba(124,58,237,0.4);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
  }
  .best-streak-title { font-size: 11px; font-weight: 600; color: var(--purple3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .best-streak-number { font-size: 64px; font-weight: 900; line-height: 1; background: linear-gradient(135deg, var(--purple2), var(--purple3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .best-streak-habit { font-size: 16px; font-weight: 600; color: var(--text2); margin-top: 4px; }

  /* CONFETTI */
  @keyframes confetti-fall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confetti-fall linear forwards;
  }

  /* MONTH HABIT BREAKDOWN */
  .habit-consistency { display: flex; flex-direction: column; gap: 10px; }
  .hc-item { display: flex; align-items: center; gap: 10px; }
  .hc-emoji { font-size: 18px; width: 28px; }
  .hc-name { font-size: 13px; font-weight: 500; width: 120px; flex-shrink: 0; }
  .hc-bar-wrap { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  .hc-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--purple), var(--purple2)); transition: width 0.8s ease; }
  .hc-pct { font-size: 12px; color: var(--text2); font-weight: 700; width: 36px; text-align: right; }

  /* DAY POPUP */
  .popup-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 500;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .popup-overlay.open { display: flex; }
  .popup {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .popup-date { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
  .popup-habits { display: flex; flex-direction: column; gap: 10px; }
  .popup-habit { display: flex; align-items: center; gap: 12px; font-size: 14px; }
  .popup-close { width: 100%; margin-top: 20px; padding: 14px; border-radius: 14px; background: var(--glass2); border: 1px solid var(--border); color: var(--text); font-family: 'Inter',sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }

  .section-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="greeting" id="greeting">Buenos días</div>
      <div class="date-label" id="date-label">Cargando...</div>
    </div>
    <div class="streak-badge" id="header-streak">🔥 0 días</div>
  </div>
</div>

<!-- TAB: HOY -->
<div class="tab-content active" id="tab-hoy">
  <div class="ring-wrap card">
    <div class="ring-container">
      <svg class="ring-svg" width="200" height="200" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="90"/>
        <circle class="ring-progress" id="ring-progress" cx="100" cy="100" r="90"/>
      </svg>
      <div class="ring-inner">
        <div class="ring-number" id="ring-number">0</div>
        <div class="ring-total">de 9</div>
        <div class="ring-label">hábitos</div>
      </div>
    </div>
    <div class="motivational" id="motivational">Todo empieza con un primer paso.</div>
  </div>

  <div class="habits-grid" id="habits-grid"></div>

  <div class="card energy-section">
    <div class="card-title">Energía del día</div>
    <div class="energy-btns">
      <button class="energy-btn" data-energy="baja" onclick="setEnergy('baja')">🔴 Baja</button>
      <button class="energy-btn" data-energy="media" onclick="setEnergy('media')">🟡 Media</button>
      <button class="energy-btn" data-energy="alta" onclick="setEnergy('alta')">🟢 Alta</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Nota del día</div>
    <textarea class="note-input" id="note-input" placeholder="Una victoria, un aprendizaje, un pensamiento..." oninput="saveNote()"></textarea>
  </div>
</div>

<!-- TAB: SEMANA -->
<div class="tab-content" id="tab-semana">
  <div class="card">
    <div class="card-title">Esta semana</div>
    <div class="week-days" id="week-days"></div>
    <div class="bar-chart" id="bar-chart"></div>
  </div>

  <div class="card">
    <div class="card-title">Hábito más fallado esta semana</div>
    <div class="missed-list" id="missed-list"></div>
  </div>

  <div class="card" id="best-day-card">
    <div class="card-title">Mejor día de la semana</div>
    <div id="best-day-content" style="font-size:18px;font-weight:700;"></div>
  </div>
</div>

<!-- TAB: MES -->
<div class="tab-content" id="tab-mes">
  <div class="stats-row" id="stats-row"></div>

  <div class="card">
    <div class="card-title" id="month-cal-title">Mayo 2026</div>
    <div class="cal-header">
      <div class="cal-header-day">L</div>
      <div class="cal-header-day">M</div>
      <div class="cal-header-day">M</div>
      <div class="cal-header-day">J</div>
      <div class="cal-header-day">V</div>
      <div class="cal-header-day">S</div>
      <div class="cal-header-day">D</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="card">
    <div class="card-title">Consistencia por hábito</div>
    <div class="habit-consistency" id="habit-consistency"></div>
  </div>
</div>

<!-- TAB: RACHAS -->
<div class="tab-content" id="tab-rachas">
  <div class="best-streak-card" id="best-streak-card">
    <div class="best-streak-title">🏆 Tu mejor racha activa</div>
    <div class="best-streak-number" id="best-streak-number">0</div>
    <div class="best-streak-habit" id="best-streak-habit">días consecutivos</div>
  </div>
  <div id="streaks-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('hoy',this)">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Hoy</span>
  </button>
  <button class="nav-btn" onclick="switchTab('semana',this)">
    <span class="nav-icon">📅</span>
    <span class="nav-label">Semana</span>
  </button>
  <button class="nav-btn" onclick="switchTab('mes',this)">
    <span class="nav-icon">📆</span>
    <span class="nav-label">Mes</span>
  </button>
  <button class="nav-btn" onclick="switchTab('rachas',this)">
    <span class="nav-icon">🏆</span>
    <span class="nav-label">Rachas</span>
  </button>
</nav>

<!-- DAY POPUP -->
<div class="popup-overlay" id="popup-overlay" onclick="closePopup(event)">
  <div class="popup">
    <div class="popup-date" id="popup-date"></div>
    <div class="popup-habits" id="popup-habits"></div>
    <button class="popup-close" onclick="closePopup()">Cerrar</button>
  </div>
</div>

<script>
const HABITS = [
  { emoji: '💪', name: 'Gimnasio' },
  { emoji: '📚', name: 'Lectura' },
  { emoji: '🧘', name: 'Meditación' },
  { emoji: '💰', name: 'Finanzas' },
  { emoji: '🗣️', name: 'Idioma' },
  { emoji: '🌅', name: 'Rutina AM' },
  { emoji: '🌙', name: 'Rutina PM' },
  { emoji: '💧', name: 'Hidratación' },
  { emoji: '👑', name: 'Soy el que controla' },
];
const TOTAL = HABITS.length;

const DAYS_ES = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_SHORT = ['D','L','M','M','J','V','S'];

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getData(key) {
  const raw = localStorage.getItem(key);
  if (!raw) return { habits: new Array(TOTAL).fill(false), energy: '', note: '' };
  return JSON.parse(raw);
}
function setData(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

// ── HEADER ──
function updateHeader() {
  const now = new Date();
  const h = now.getHours();
  let greet = h < 12 ? '☀️ Buenos días' : h < 19 ? '🌤 Buenas tardes' : '🌙 Buenas noches';
  document.getElementById('greeting').textContent = greet;
  document.getElementById('date-label').textContent = `${DAYS_ES[now.getDay()]}, ${now.getDate()} de ${MONTHS_ES[now.getMonth()]}`;
  // best streak for header
  const best = getBestActiveStreak();
  document.getElementById('header-streak').textContent = `🔥 ${best.streak} días`;
}

// ── RING ──
function updateRing(count) {
  const pct = count / TOTAL;
  const circumference = 565;
  const offset = circumference - (pct * circumference);
  const ring = document.getElementById('ring-progress');
  ring.style.strokeDashoffset = offset;
  const color = pct === 0 ? '#334155' : pct < 0.3 ? '#ef4444' : pct < 0.6 ? '#f97316' : pct < 0.8 ? '#10b981' : '#7c3aed';
  ring.style.stroke = color;
  document.getElementById('ring-number').textContent = count;

  const phrases = [
    [0, 'Todo empieza con un primer paso. 💫'],
    [0.11, '¡Arrancaste! Sigue adelante. 💪'],
    [0.33, 'Buen ritmo. No pares ahora. ⚡'],
    [0.55, 'Por encima del promedio. Sólido. 🔥'],
    [0.77, 'Casi ahí. Termina lo que empezaste. 🎯'],
    [0.89, 'Un hábito más para la perfección. 👑'],
    [1.0, '¡DÍA PERFECTO! Eres el que controla. 👑🔥'],
  ];
  let phrase = phrases[0][1];
  for (const [threshold, text] of phrases) { if (pct >= threshold) phrase = text; }
  document.getElementById('motivational').textContent = phrase;

  if (pct === 1) launchConfetti();
}

// ── HABITS GRID ──
function renderHabits() {
  const key = todayKey();
  const data = getData(key);
  const grid = document.getElementById('habits-grid');
  grid.innerHTML = '';
  data.habits.forEach((done, i) => {
    const h = HABITS[i];
    const card = document.createElement('div');
    card.className = `habit-card ${done ? 'done' : ''}`;
    card.innerHTML = `<div class="habit-emoji">${h.emoji}</div><div class="habit-name">${h.name}</div><div class="habit-check"></div>`;
    card.onclick = () => toggleHabit(i);
    grid.appendChild(card);
  });
  const count = data.habits.filter(Boolean).length;
  updateRing(count);
  // energy
  document.querySelectorAll('.energy-btn').forEach(b => b.classList.remove('selected'));
  if (data.energy) document.querySelector(`[data-energy="${data.energy}"]`)?.classList.add('selected');
  document.getElementById('note-input').value = data.note || '';
}

function toggleHabit(i) {
  const key = todayKey();
  const data = getData(key);
  data.habits[i] = !data.habits[i];
  setData(key, data);
  renderHabits();
  // pop animation
  const cards = document.querySelectorAll('.habit-card');
  cards[i].classList.add('popping');
  cards[i].addEventListener('animationend', () => cards[i].classList.remove('popping'), {once:true});
}

function setEnergy(e) {
  const key = todayKey();
  const data = getData(key);
  data.energy = e;
  setData(key, data);
  document.querySelectorAll('.energy-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`[data-energy="${e}"]`).classList.add('selected');
}

function saveNote() {
  const key = todayKey();
  const data = getData(key);
  data.note = document.getElementById('note-input').value;
  setData(key, data);
}

// ── WEEK TAB ──
function renderWeek() {
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  // Week starts Monday
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((dow + 6) % 7));

  const weekDays = document.getElementById('week-days');
  const barChart = document.getElementById('bar-chart');
  weekDays.innerHTML = '';
  barChart.innerHTML = '';

  const dayNames = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  let maxCount = 0;
  const counts = [];

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const k = dateKey(d);
    const isToday = k === todayKey();
    const isFuture = d > today && !isToday;
    const data = getData(k);
    const count = isFuture ? null : data.habits.filter(Boolean).length;
    counts.push(count);
    if (count !== null && count > maxCount) maxCount = count;
    const pct = count === null ? null : Math.round(count / TOTAL * 100);

    let cls = 'future';
    if (!isFuture) {
      if (count === 0) cls = 'empty';
      else if (pct < 30) cls = 'low';
      else if (pct < 60) cls = 'mid';
      else if (pct < 100) cls = 'good';
      else cls = 'perfect';
    }

    const dayDiv = document.createElement('div');
    dayDiv.className = 'week-day';
    dayDiv.innerHTML = `
      <div class="week-day-name">${dayNames[i]}</div>
      <div class="week-day-circle ${cls} ${isToday?'today':''}">${isFuture ? '' : (count === null ? '-' : count)}</div>
      <div class="week-day-pct">${isFuture ? '' : (pct !== null ? pct+'%' : '')}</div>
    `;
    weekDays.appendChild(dayDiv);
  }

  // Bar chart
  const colors = ['#334155','#ef4444','#f97316','#10b981','#7c3aed'];
  counts.forEach((count, i) => {
    const col = document.createElement('div');
    col.className = 'bar-col';
    const heightPct = count === null || maxCount === 0 ? 0 : (count / maxCount * 100);
    const color = count === null ? colors[0] : count === 0 ? colors[0] : count/TOTAL < 0.3 ? colors[1] : count/TOTAL < 0.6 ? colors[2] : count/TOTAL < 1 ? colors[3] : colors[4];
    col.innerHTML = `<div class="bar" style="height:${heightPct}%;background:${color};"></div><div class="bar-val">${count !== null ? count : ''}</div>`;
    barChart.appendChild(col);
  });

  // Missed habits this week
  const missedList = document.getElementById('missed-list');
  missedList.innerHTML = '';
  const missCounts = new Array(TOTAL).fill(0);
  let daysWithData = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    if (d > today) continue;
    const k = dateKey(d);
    const data = getData(k);
    const hasAny = data.habits.some(Boolean);
    if (hasAny) { daysWithData++; data.habits.forEach((v,j) => { if (!v) missCounts[j]++; }); }
  }
  const sorted = missCounts.map((c,i)=>({i,c})).filter(x=>x.c>0).sort((a,b)=>b.c-a.c).slice(0,5);
  if (sorted.length === 0) {
    missedList.innerHTML = '<div style="color:var(--text2);font-size:14px;">¡Sin hábitos fallados esta semana! 🎉</div>';
  } else {
    sorted.forEach(({i,c}) => {
      const h = HABITS[i];
      const el = document.createElement('div');
      el.className = 'missed-item';
      el.innerHTML = `<div class="missed-name">${h.emoji} ${h.name}</div><div class="missed-bar-wrap"><div class="missed-bar" style="width:${c/daysWithData*100}%"></div></div><div class="missed-count">${c}x</div>`;
      missedList.appendChild(el);
    });
  }

  // Best day
  let bestDay = -1, bestCount = -1;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    if (d > today) continue;
    const k = dateKey(d);
    const cnt = getData(k).habits.filter(Boolean).length;
    if (cnt > bestCount) { bestCount = cnt; bestDay = i; }
  }
  const bestDayContent = document.getElementById('best-day-content');
  if (bestDay >= 0 && bestCount > 0) {
    const d = new Date(monday); d.setDate(monday.getDate() + bestDay);
    bestDayContent.innerHTML = `${dayNames[bestDay]} — ${bestCount}/${TOTAL} hábitos <span style="color:var(--purple2);font-size:14px;">(${Math.round(bestCount/TOTAL*100)}%)</span>`;
  } else {
    bestDayContent.innerHTML = `<span style="color:var(--text3);font-size:14px;">Sin datos esta semana aún</span>`;
  }
}

// ── MONTH TAB ──
function renderMonth() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  document.getElementById('month-cal-title').textContent = `${MONTHS_ES[month]} ${year}`;

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  const startDow = (firstDay.getDay() + 6) % 7; // Monday=0

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  let perfectDays = 0, totalPct = 0, daysWithData = 0;
  let bestStreak = 0, curStreak = 0;

  // Fill empty cells
  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(year, month, d);
    const k = dateKey(date);
    const isToday = k === todayKey();
    const isFuture = date > now && !isToday;
    const data = getData(k);
    const count = data.habits.filter(Boolean).length;
    const pct = count / TOTAL;

    let cls = 'no-data';
    if (isFuture) { cls = 'future'; curStreak = 0; }
    else if (count === 0) { cls = 'no-data'; curStreak = 0; }
    else {
      daysWithData++;
      totalPct += pct;
      curStreak++;
      if (curStreak > bestStreak) bestStreak = curStreak;
      if (pct === 1) { cls = 'perfect'; perfectDays++; }
      else if (pct >= 0.8) cls = 'good';
      else if (pct >= 0.5) cls = 'mid';
      else cls = 'low';
    }

    const el = document.createElement('div');
    el.className = `cal-day ${cls} ${isToday ? 'today-cal' : ''}`;
    el.textContent = d;
    el.onclick = () => !isFuture && showDayPopup(k, date);
    grid.appendChild(el);
  }

  // Stats
  const statsRow = document.getElementById('stats-row');
  const avgPct = daysWithData > 0 ? Math.round(totalPct / daysWithData * 100) : 0;
  statsRow.innerHTML = `
    <div class="stat-card"><div class="stat-number">${perfectDays}</div><div class="stat-label">Días perfectos</div></div>
    <div class="stat-card"><div class="stat-number">${avgPct}%</div><div class="stat-label">Promedio mes</div></div>
    <div class="stat-card"><div class="stat-number">${bestStreak}</div><div class="stat-label">Mejor racha</div></div>
  `;

  // Habit consistency
  const hc = document.getElementById('habit-consistency');
  hc.innerHTML = '';
  HABITS.forEach((h, i) => {
    let hitDays = 0;
    for (let d = 1; d <= Math.min(now.getDate(), lastDay.getDate()); d++) {
      const k = dateKey(new Date(year, month, d));
      const data = getData(k);
      if (data.habits[i]) hitDays++;
    }
    const totalDays = now.getDate();
    const pct = totalDays > 0 ? Math.round(hitDays / totalDays * 100) : 0;
    const el = document.createElement('div');
    el.className = 'hc-item';
    el.innerHTML = `<div class="hc-emoji">${h.emoji}</div><div class="hc-name">${h.name}</div><div class="hc-bar-wrap"><div class="hc-bar" style="width:${pct}%"></div></div><div class="hc-pct">${pct}%</div>`;
    hc.appendChild(el);
  });
}

// ── STREAKS ──
function calcStreak(habitIndex) {
  const today = new Date();
  let streak = 0;
  let maxStreak = 0;
  let cur = 0;
  // Scan last 365 days
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const k = dateKey(d);
    const data = getData(k);
    if (data.habits[habitIndex]) {
      if (i === 0 || streak > 0) streak++;
      cur++;
      if (cur > maxStreak) maxStreak = cur;
    } else {
      if (i === 0) streak = 0;
      else { if (streak > 0) {} cur = 0; }
      if (i > 0 && streak > 0) { streak = 0; }
    }
  }
  // Proper streak calc
  streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const k = dateKey(d);
    const data = getData(k);
    if (data.habits[habitIndex]) streak++;
    else break;
  }
  return { streak, maxStreak };
}

function getLevel(streak) {
  if (streak >= 365) return { label: '👑 Leyenda', next: null, progress: 1 };
  if (streak >= 180) return { label: '💎 Élite', next: 365, progress: (streak-180)/185 };
  if (streak >= 90) return { label: '🔥 Imparable', next: 180, progress: (streak-90)/90 };
  if (streak >= 30) return { label: '⚡ En Racha', next: 90, progress: (streak-30)/60 };
  if (streak >= 14) return { label: '💪 Construyendo', next: 30, progress: (streak-14)/16 };
  if (streak >= 7) return { label: '🌱 Semilla', next: 14, progress: (streak-7)/7 };
  return { label: '🎯 Iniciando', next: 7, progress: streak/7 };
}

function getBestActiveStreak() {
  let best = { streak: 0, name: '' };
  HABITS.forEach((h, i) => {
    const { streak } = calcStreak(i);
    if (streak > best.streak) best = { streak, name: h.emoji + ' ' + h.name };
  });
  return best;
}

function renderStreaks() {
  const list = document.getElementById('streaks-list');
  list.innerHTML = '';
  let bestStreak = 0, bestName = '';

  HABITS.forEach((h, i) => {
    const { streak, maxStreak } = calcStreak(i);
    if (streak > bestStreak) { bestStreak = streak; bestName = h.emoji + ' ' + h.name; }
    const level = getLevel(streak);
    const alive = streak > 0;

    const card = document.createElement('div');
    card.className = `streak-card ${alive ? 'alive' : 'dead'}`;
    card.innerHTML = `
      <div class="streak-emoji">${h.emoji}</div>
      <div class="streak-info">
        <div class="streak-habit-name">${h.name}</div>
        <div class="streak-level">${level.label}</div>
        <div class="streak-progress-bar">
          <div class="streak-progress-fill" style="width:${level.progress*100}%"></div>
        </div>
      </div>
      <div class="streak-right">
        <div class="streak-days">${streak}</div>
        <div class="streak-days-label">días</div>
        <div class="streak-status">${alive ? '🟢 Viva' : '💀 Rota'}</div>
      </div>
    `;
    list.appendChild(card);
  });

  document.getElementById('best-streak-number').textContent = bestStreak;
  document.getElementById('best-streak-habit').textContent = bestStreak > 0 ? bestName : 'días consecutivos';
}

// ── POPUP ──
function showDayPopup(key, date) {
  const data = getData(key);
  document.getElementById('popup-date').textContent = `${DAYS_ES[date.getDay()]} ${date.getDate()} de ${MONTHS_ES[date.getMonth()]}`;
  const hab = document.getElementById('popup-habits');
  hab.innerHTML = '';
  HABITS.forEach((h, i) => {
    const el = document.createElement('div');
    el.className = 'popup-habit';
    el.innerHTML = `<span>${data.habits[i] ? '✅' : '⬜'}</span><span>${h.emoji} ${h.name}</span>`;
    hab.appendChild(el);
  });
  document.getElementById('popup-overlay').classList.add('open');
}
function closePopup(e) {
  if (!e || e.target === document.getElementById('popup-overlay')) {
    document.getElementById('popup-overlay').classList.remove('open');
  }
}

// ── CONFETTI ──
function launchConfetti() {
  const colors = ['#7c3aed','#a855f7','#c084fc','#10b981','#f59e0b','#ffffff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-20px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (Math.random() * 10 + 5) + 'px';
      el.style.height = (Math.random() * 10 + 5) + 'px';
      el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
      el.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 30);
  }
}

// ── TABS ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'semana') renderWeek();
  if (name === 'mes') renderMonth();
  if (name === 'rachas') renderStreaks();
}

// ── INIT ──
function init() {
  updateHeader();
  renderHabits();
  // Animate ring on load
  setTimeout(() => {
    const key = todayKey();
    const count = getData(key).habits.filter(Boolean).length;
    updateRing(count);
  }, 300);
}

init();
</script>
